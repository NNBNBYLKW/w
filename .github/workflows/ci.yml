name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r apps/backend/requirements.txt
      - run: python -m pytest apps/backend/tests/ -v --tb=short

  frontend-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: apps/frontend
      - run: npm run build
        working-directory: apps/frontend
      - run: npm test
        working-directory: apps/frontend
